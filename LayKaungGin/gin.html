<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Lay Kaung Gin - MoneyBed 3D</title>
    <link rel="stylesheet" href="gin.css">
</head>
<body>
    <h2 style="color: gold; text-align: center;">လေးကောင်ဂျင်</h2>
    
    <div class="gin-board">
        <div id="displayResult" class="result-circle">?</div>
        
        <div class="betting-area">
            <button onclick="placeBet('ကြက်')">ကြက်</button>
            <button onclick="placeBet('ကျား')">ကျား</button>
            <button onclick="placeBet('ဖား')">ဖား</button>
            <button onclick="placeBet('ပုဇွန်')">ပုဇွန်</button>
        </div>
    </div>

    <div class="controls">
        <button class="spin-btn" onclick="spinGin()">ဂျင်လှည့်မည်</button>
    </div>

    <script src="gin.js"></script>
    <script>
        let currentBets = { "ကြက်": 0, "ကျား": 0, "ဖား": 0, "ပုဇွန်": 0 };

        function placeBet(type) {
            currentBets[type] += 1000;
            alert(type + " တွင် 1000 ဖိုး လောင်းလိုက်ပါပြီ");
        }

        function spinGin() {
            let res = playGin(currentBets);
            document.getElementById('displayResult').innerText = "လှည့်နေသည်...";
            
            setTimeout(() => {
                document.getElementById('displayResult').innerText = res.result;
                alert("ရလဒ်မှာ " + res.result + " ဖြစ်ပါသည်။ အနိုင်ကြေး: " + res.payout);
                currentBets = { "ကြက်": 0, "ကျား": 0, "ဖား": 0, "ပုဇွန်": 0 }; // Reset Bets
            }, 2000);
        }
    </script>
</body>
</html>
