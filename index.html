<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyBed 3D - Login</title>
    <style>
        body { margin: 0; background: #000 url('1000020838.png') no-repeat center center fixed; background-size: cover; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 15px; border: 2px solid #ffd700; text-align: center; width: 320px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ffd700; background: #1a1a1a; color: #fff; outline: none; }
        button { width: 100%; padding: 12px; background: linear-gradient(to bottom, #ffd700, #b8860b); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: gold; text-shadow: 0 0 10px gold;">MoneyBed 3D</h2>
        <input type="text" id="phone" placeholder="ဖုန်းနံပါတ်">
        <input type="text" id="name" placeholder="အမည်">
        <input type="password" id="admin_id" placeholder="ID"> <button onclick="checkLogin()">ဝင်မည်</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
