<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MoneyBed 3D</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="login">

  <h1>MoneyBed 3D</h1>

  <!-- Phone and Name Inputs -->
  <input type="text" placeholder="ဖုန်းနံပတ်">
  <input type="text" placeholder="နာမည်">

  <!-- ID + Eye toggle -->
  <div class="idrow">
    <input type="password" id="id" placeholder="ID">
    <button class="eye" onclick="showID()">
      <img src="assets/images/eye.png" alt="Show ID" style="width:20px; height:20px;">
    </button>
  </div>

  <!-- Login row -->
  <div class="loginrow">
    <button class="loginbtn" onclick="login()">ဝင်ရန်</button>
    <label>
      <input type="checkbox"> မှတ်ထားရန်
    </label>
  </div>

  <br>

  <!-- Language selection -->
  <select>
    <option>မြန်မာ</option>
    <option>English</option>
  </select>

  <br><br>

  <!-- Unit top-up -->
  <button class="unitbtn" onclick="alert('Unit ထည့်ရန် Owner နဲ့ဆက်သွယ်ပါ')">ယူနစ်ဖြည့်ရန်</button>

</div>

<script src="script.js"></script>
</body>
</html>
