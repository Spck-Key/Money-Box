<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyBed 3D - Login</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        .login-card {
            width: 90%;
            max-width: 380px;
            background: #000;
            padding: 40px 20px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        h1 { color: #ffd700; margin-bottom: 30px; font-size: 28px; text-shadow: 0 0 10px #ffd700; }
        
        .input-group { margin-bottom: 15px; }
        
        /* စာရိုက်လို့ရအောင် သေချာပြင်ထားသော Input များ */
        input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #ffd700; background: #222; }
        input::placeholder { color: #666; }

        .btn-login {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: linear-gradient(to bottom, #ffd700, #b8860b);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-login:active { transform: scale(0.98); }
        
        .footer-link { margin-top: 20px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>MoneyBed 3D</h1>
        
        <div class="input-group">
            <input type="tel" id="phone" placeholder="ဖုန်းနံပါတ် (၀၉xxxxxxxxx)" autocomplete="off">
        </div>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="အမည်" autocomplete="off">
        </div>
        
        <div class="input-group">
            <input type="text" id="userid" placeholder="ID နံပါတ်" autocomplete="off">
        </div>

        <button class="btn-login" onclick="handleLogin()">ဝင်မည်</button>

        <div class="footer-link">
            စနစ်ကို စမ်းသပ်ရန်အတွက်သာ ဖြစ်ပါသည်
        </div>
    </div>

    <script>
        function handleLogin() {
            const phone = document.getElementById('phone').value;
            const user = document.getElementById('username').value;
            const id = document.getElementById('userid').value;

            // အခြေခံ စစ်ဆေးမှု
            if(phone === "" || user === "" || id === "") {
                alert("အချက်အလက်များကို ပြည့်စုံစွာ ဖြည့်စွက်ပါ");
                return;
            }

            // အချက်အလက်များကို သိမ်းဆည်းခြင်း
            localStorage.setItem('currentUser', user);
            localStorage.setItem('currentId', id);

            alert("အောင်မြင်စွာ ဝင်ရောက်ပြီးပါပြီ");
            
            // ဒိုင်ချုပ် Dashboard သို့ တိုက်ရိုက်သွားမည်
            window.location.href = "admin.html";
        }
    </script>
</body>
</html>
