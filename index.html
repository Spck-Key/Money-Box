<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyBed 3D - Login</title>
    <link rel="stylesheet" href="main-style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="login-box">
        <h1 style="color: #d4af37;">MoneyBed 3D</h1>
        <input type="text" id="loginPhone" placeholder="ဖုန်းနံပတ် ထည့်ပါ">
        <input type="password" id="loginPass" placeholder="Password ထည့်ပါ">
        <button onclick="handleLogin()">LOGIN</button>
        <p>အကောင့်မရှိသေးပါက <a href="register.html" style="color: #d4af37;">ဒီမှာဖွင့်ပါ</a></p>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://moneybed-3d-4396b-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        function handleLogin() {
            const ph = document.getElementById('loginPhone').value;
            const pw = document.getElementById('loginPass').value;
            db.ref('users/' + ph).once('value', (snap) => {
                if(snap.exists() && snap.val().password === pw) {
                    localStorage.setItem('currentUser', ph);
                    window.location.href = 'home.html';
                } else { alert("အချက်အလက် မှားယွင်းနေပါသည်။"); }
            });
        }
    </script>
</body>
</html>
