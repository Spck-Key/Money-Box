<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyBed 3D - Login</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .login-card { width: 90%; max-width: 380px; background: #000; padding: 40px 20px; border-radius: 20px; border: 2px solid #ffd700; text-align: center; }
        h1 { color: #ffd700; margin-bottom: 30px; text-shadow: 0 0 10px #ffd700; }
        input { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: #fff; margin-bottom: 15px; outline: none; font-size: 16px; }
        input:focus { border-color: #ffd700; }
        .btn-login { width: 100%; padding: 15px; background: linear-gradient(to bottom, #ffd700, #b8860b); border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>MoneyBed 3D</h1>
        <input type="tel" id="phone" placeholder="ဖုန်းနံပါတ်">
        <input type="text" id="username" placeholder="အမည်">
        <input type="text" id="userid" placeholder="ID နံပါတ်">
        <button class="btn-login" onclick="handleLogin()">ဝင်မည်</button>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            if(user === "") { alert("အမည်ဖြည့်သွင်းပါ"); return; }
            
            // admin.html သို့ တိုက်ရိုက်သွားရန် (Path အမှန်)
            window.location.href = "admin.html"; 
        }
    </script>
</body>
</html>
