<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MoneyBed 3D</title>
    <link rel="stylesheet" href="main-style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="reg-box">
        <h2>အကောင့်သစ်ဖွင့်ရန်</h2>
        <input type="text" id="newName" placeholder="နာမည် ထည့်ပါ">
        <input type="text" id="newPhone" placeholder="ဖုန်းနံပတ် ထည့်ပါ">
        <button onclick="registerUser()">REGISTER</button>
        <div id="result" style="margin-top: 15px; display: none; color: #00ff00;"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://moneybed-3d-4396b-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function registerUser() {
            const name = document.getElementById('newName').value;
            const ph = document.getElementById('newPhone').value;
            if(!name || !ph) return alert("အချက်အလက် ဖြည့်ပါ");
            
            const pass = "MB" + Math.floor(1000 + Math.random() * 9000);
            db.ref('users/' + ph).set({
                username: name, phone: ph, password: pass, balance: 0, status: "active"
            }).then(() => {
                const res = document.getElementById('result');
                res.innerHTML = `အောင်မြင်ပါသည်။<br>Password: <b>${pass}</b>`;
                res.style.display = "block";
            });
        }
    </script>
</body>
</html>
