<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>13 Cards Strategy - MoneyBed 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="table-13">
        <h2 style="color: #ffd700;">၁၃ ချပ် (13 Cards)</h2>
        
        <div class="dealer-side">
            <div class="label">ဒိုင် (Dealer)</div>
            <div id="dealer-rows" class="rows-container">
                <div id="d-row-1" class="mini-row"></div> <div id="d-row-2" class="mini-row"></div> <div id="d-row-3" class="mini-row"></div> </div>
        </div>

        <div class="player-side">
            <div id="player-rows" class="rows-container">
                <div id="p-row-1" class="mini-row"></div>
                <div id="p-row-2" class="mini-row"></div>
                <div id="p-row-3" class="mini-row"></div>
            </div>
            <div class="label">လူကြီးမင်း (Player)</div>
        </div>

        <div class="control-panel">
            <button class="btn-start" onclick="start13Cards()">ဖဲဝေမည်</button>
            <button onclick="location.reload()">အသစ်ပြန်စ</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
