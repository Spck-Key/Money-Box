<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Gold Mine Slot - MoneyBed 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slot-machine">
        <h2 style="color: #ffd700;">ရွှေဂိမ်း (Gold Mine)</h2>
        
        <div class="reels">
            <div id="reel1" class="reel"></div>
            <div id="reel2" class="reel"></div>
            <div id="reel3" class="reel"></div>
        </div>

        <div id="msg" class="win-msg">ကံစမ်းလိုက်ပါ!</div>

        <div class="controls">
            <button class="spin-btn" onclick="spin()">လှည့်မည် (Spin)</button>
            <button onclick="location.reload()">ပြန်စမည်</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
