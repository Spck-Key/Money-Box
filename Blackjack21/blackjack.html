<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Blackjack 21 - MoneyBed 3D</title>
    <link rel="stylesheet" href="blackjack.css">
</head>
<body>
    <div class="bj-container">
        <h2 style="color: #ffd700;">Blackjack 21 (ဒိုင်စနစ်)</h2>

        <div class="section">
            <div class="label">ဒိုင် (Dealer) - <span id="dealer-score">0</span></div>
            <div id="dealer-cards" class="card-slots"></div>
        </div>

        <div class="vs-divider">VS</div>

        <div class="section">
            <div id="player-cards" class="card-slots"></div>
            <div class="label">လူကြီးမင်း (Player) - <span id="player-score">0</span></div>
        </div>

        <div class="bj-controls">
            <div class="bet-tag">Bet: <span id="current-bet">1000</span></div>
            <button id="hit-btn" onclick="hit()">ထပ်ဆွဲမည် (Hit)</button>
            <button id="stay-btn" onclick="stay()">တော်ပြီ (Stay)</button>
            <button id="deal-btn" onclick="startNewGame()">အသစ်စမည်</button>
        </div>
        
        <div id="message" class="msg-box"></div>
    </div>
    <script src="blackjack.js"></script>
</body>
</html>
