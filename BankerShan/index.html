<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Banker Shan - MoneyBed 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h2 style="color: gold;">ရှမ်းကိုးမီး (ပိုင်ရှင်ဒိုင်စနစ်)</h2>
        
        <div class="setup-box" id="setup-area">
            <label>ဝိုင်းကြေးရွေးချယ်ပါ:</label>
            <select id="table-select" onchange="updateRequirement()">
                <option value="100">၁၀၀ ကျပ်တန်ဝိုင်း</option>
                <option value="1000" selected>၁,၀၀၀ ကျပ်တန်ဝိုင်း</option>
                <option value="5000">၅,၀၀၀ ကျပ်တန်ဝိုင်း</option>
            </select>
            <p id="require-msg">ဒိုင်ကိုင်ရန် အနည်းဆုံး: ၅၀,၀၀၀ ကျပ် လိုအပ်သည်</p>
            <button class="btn-start" onclick="checkAndStart()">ဒိုင်စကိုင်မည်</button>
        </div>

        <div id="game-area" class="hidden">
            <div class="dealer-hand">
                <div class="label">ဒိုင် (Banker)</div>
                <div id="d-cards" class="cards"></div>
                <div id="d-res" class="badge">-</div>
            </div>
            <div class="player-hand">
                <div id="p-res" class="badge">-</div>
                <div id="p-cards" class="cards"></div>
                <div class="label">ကစားသမား (Player)</div>
            </div>
            <div class="actions">
                <button onclick="dealCards()">ဖဲဝေမည်</button>
                <button onclick="location.reload()">ဝိုင်းပြောင်းမည်</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
