<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MoneyBed 3D Table</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="table">
  <!-- Dynamic Game Name -->
  <h2 id="gameName">Game Name</h2>

  <!-- Player / AI / Owner slots -->
  <div class="players">
    <div class="player">
      P-101<br>
      Unit: <span class="unit">50</span>
    </div>
    <div class="player">
      P-102<br>
      Unit: <span class="unit">30</span>
    </div>
    <div class="player ai">
      AI<br>
      Unit: <span class="unit">40</span>
    </div>
    <div class="player owner">
      Owner<br>
      Unit: <span class="unit">100</span>
    </div>
  </div>

  <!-- Action Buttons -->
  <button class="playbtn" onclick="playRound()">Play 1 Round</button>
  <button class="playbtn" onclick="autoPlay(5,1200)">Play 5 Rounds</button>
  <button class="playbtn" onclick="autoPlay(10,1200)">Play 10 Rounds</button>
</div>

<script src="script.js"></script>
</body>
</html>
