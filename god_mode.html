<!DOCTYPE html>
<html>
<head><title>God Mode</title><link rel="stylesheet" href="main-style.css"></head>
<body>
    <div class="reg-box">
        <h2 style="color: red;">GOD MODE</h2>
        <input type="text" id="targetPh" placeholder="User ဖုန်းနံပတ်">
        <input type="number" id="amount" placeholder="ငွေပမာဏ">
        <button onclick="updateBalance('add')" style="background: green; color: white;">ADD MONEY</button>
        <button onclick="updateBalance('sub')" style="background: orange; color: black;">DEDUCT MONEY</button>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://moneybed-3d-4396b-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        function updateBalance(type) {
            const ph = document.getElementById('targetPh').value;
            const amt = parseInt(document.getElementById('amount').value);
            const ref = db.ref('users/' + ph + '/balance');
            ref.once('value', (snap) => {
                let current = snap.val() || 0;
                let final = (type === 'add') ? current + amt : current - amt;
                ref.set(final).then(() => alert("Balance Updated to: " + final));
            });
        }
    </script>
</body>
</html>
