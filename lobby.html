<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MoneyBed 3D Lobby</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="login">

  <h1>MoneyBed 3D</h1>

  <h2>ဂိမ်းများ</h2>

  <div class="games">
    <button class="game" onclick="goTable('Shankomee')">ရှမ်းကိုးမီး</button>
    <button class="game" onclick="goTable('21')">21</button>
    <button class="game" onclick="goTable('Bugyi')">ဘူကြီး</button>
    <button class="game" onclick="goTable('Sho')">ရှိုး</button>
    <button class="game" onclick="goTable('Slot')">စလော့</button>
    <button class="game" onclick="goTable('Kyanagar')">ကျားနဂါး</button>
    <button class="game" onclick="goTable('Ansatone')">အံစာတုံး</button>
    <button class="game" onclick="goTable('Agyithay')">အကြီးအသေး</button>
  </div>

  <br>

  <button class="unitbtn" onclick="alert('Unit ထည့်ရန် Owner နဲ့ဆက်သွယ်ပါ')">ယူနစ်ဖြည့်ရန်</button>

  <br><br>

  <select>
    <option>မြန်မာ</option>
    <option>English</option>
  </select>

</div>

<script src="script.js"></script>
</body>
</html>
