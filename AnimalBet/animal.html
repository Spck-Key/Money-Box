<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Animal Betting - MoneyBed 3D</title>
    <link rel="stylesheet" href="animal.css">
</head>
<body>
    <div class="header">
        <h2 style="color: gold;">ခြောက်ကောင်ဂိမ်း</h2>
        <div class="balance">Balance: <span id="userBal">100000</span></div>
    </div>

    <div class="result-display" id="resultBox">?</div>

    <div class="betting-board">
        <div class="bet-slot" onclick="placeBet('ရွှေငါး')">🐟<br>ငါး<br><span id="b-ရွှေငါး">0</span></div>
        <div class="bet-slot" onclick="placeBet('ပုဇွန်')">🦐<br>ပုဇွန်<br><span id="b-ပုဇွန်">0</span></div>
        <div class="bet-slot" onclick="placeBet('ကြက်')">🐓<br>ကြက်<br><span id="b-ကြက်">0</span></div>
        <div class="bet-slot" onclick="placeBet('ကျား')">🐅<br>ကျား<br><span id="b-ကျား">0</span></div>
        <div class="bet-slot" onclick="placeBet('ကဏန်း')">🦀<br>ကဏန်း<br><span id="b-ကဏန်း">0</span></div>
        <div class="bet-slot" onclick="placeBet('ဖား')">🐸<br>ဖား<br><span id="b-ဖား">0</span></div>
    </div>

    <div class="footer">
        <button class="action-btn" onclick="runGame()">လှည့်မည်</button>
        <button class="reset-btn" onclick="resetAll()">အသစ်ပြန်တင်</button>
    </div>

    <script src="animal.js"></script>
    <script>
        let currentBets = { "ရွှေငါး": 0, "ပုဇွန်": 0, "ကြက်": 0, "ကျား": 0, "ကဏန်း": 0, "ဖား": 0 };

        function placeBet(animal) {
            currentBets[animal] += 1000;
            document.getElementById(`b-${animal}`).innerText = currentBets[animal];
        }

        function runGame() {
            let res = playAnimalGame(currentBets);
            document.getElementById('resultBox').innerText = "Wait...";
            
            setTimeout(() => {
                document.getElementById('resultBox').innerText = res.winningAnimal;
                alert("ရလဒ်မှာ: " + res.winningAnimal + "\nအနိုင်ရရှိငွေ: " + res.payout);
                resetAll();
            }, 2000);
        }

        function resetAll() {
            currentBets = { "ရွှေငါး": 0, "ပုဇွန်": 0, "ကြက်": 0, "ကျား": 0, "ကဏန်း": 0, "ဖား": 0 };
            document.querySelectorAll('.bet-slot span').forEach(s => s.innerText = "0");
        }
    </script>
</body>
</html>
