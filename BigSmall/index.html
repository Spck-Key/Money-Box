<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Big or Small (Sic Bo) - MoneyBed 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sicbo-table">
        <h2 style="color: gold;">အကြီး/အသေး (Big vs Small)</h2>
        
        <div class="dice-container">
            <div id="d1" class="dice">?</div>
            <div id="d2" class="dice">?</div>
            <div id="d3" class="dice">?</div>
        </div>

        <div id="total-score" class="score-board">စုစုပေါင်း: -</div>
        <div id="status" class="status-msg">လောင်းကြေးတင်ပါ</div>

        <div class="bet-grid">
            <button class="btn small" onclick="playBigSmall('small')">အသေး (4-10)</button>
            <button class="btn big" onclick="playBigSmall('big')">အကြီး (11-17)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
