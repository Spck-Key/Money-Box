<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffalo King - MoneyBed 3D</title>
    
    <link rel="stylesheet" href="buffalo.css">
    
    <style>
        /* အပိုဆောင်း UI ပြင်ဆင်ချက်အချို့ */
        .info-bar { 
            display: flex; 
            gap: 20px; 
            margin-top: 15px; 
            background: rgba(0,0,0,0.8); 
            padding: 10px 25px; 
            border-radius: 10px; 
            border: 1px solid gold; 
            color: white;
            font-family: sans-serif;
        }
        .controls { margin-top: 20px; text-align: center; }
        h2 { text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>

    <h2 style="color: gold; text-shadow: 0 0 10px gold;">BUFFALO KING 1024 WAYS</h2>

    <div class="slot-machine">
        <div class="grid" id="slotGrid">
            </div>
    </div>

    <div class="info-bar">
        <div>Bet: <span id="currentBet">1000</span></div>
        <div>Balance: <span id="userBalance">50000</span></div>
        <div style="color: lime;">Win: <span id="lastWin">0</span></div>
    </div>

    <div class="controls">
        <button class="spin-btn" onclick="handleSpin()">SPIN (လှည့်မည်)</button>
    </div>

    <script src="buffalo.js"></script>
    
    <script>
        // Grid UI ကို အလိုအလျောက် တည်ဆောက်ခြင်း
        const gridUI = document.getElementById('slotGrid');
        for (let i = 0; i < 15; i++) {
            let cell = document.createElement('div');
            cell.className = 'slot-cell';
            cell.innerText = '?';
            gridUI.appendChild(cell);
        }

        // လှည့်သည့် လုပ်ဆောင်ချက်
        function handleSpin() {
            const cells = document.querySelectorAll('.slot-cell');
            
            // ၁။ လှည့်နေသည့် Animation (Spinning) စတင်ခြင်း
            cells.forEach(cell => {
                cell.classList.add('spinning');
                cell.classList.remove('buffalo-win'); // အဟောင်းများကို ဖျက်ခြင်း
            });

            // ၂။ ၁ စက္ကန့်အကြာတွင် AI ဆီမှ ရလဒ်တောင်းပြီး ပြသခြင်း
            setTimeout(() => {
                let bet = parseInt(document.getElementById('currentBet').innerText);
                
                // buffalo.js ထဲရှိ AI Logic ကို လှမ်းခေါ်ခြင်း
                let result = processSpin(bet); 

                result.grid.forEach((symbol, index) => {
                    cells[index].classList.remove('spinning');
                    cells[index].innerText = symbol.name;
                    
                    // ၃။ ကျွဲရုပ် (Buffalo) ပွင့်ပါက အထူးအရောင် ပြောင်းခြင်း
                    if (symbol.name === "Buffalo") {
                        cells[index].classList.add('buffalo-win');
                    }
                });

                // ၄။ အနိုင်ပမာဏကို ပြသခြင်း
                document.getElementById('lastWin').innerText = result.payout;
                
                // ၅။ ဒိုင်အမြတ်ကို Console တွင် စစ်ဆေးနိုင်သည်
                console.log("Admin Cut (30%): " + result.adminProfit);
            }, 1000);
        }
    </script>
</body>
</html>
