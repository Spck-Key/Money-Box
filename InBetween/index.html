<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>In-Between Game - MoneyBed 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-board">
        <h2 style="color: #f1c40f;">ကြားဖဲ (In-Between)</h2>
        
        <div class="card-display">
            <div id="card-left" class="card">?</div>
            <div id="card-middle" class="card hidden">?</div>
            <div id="card-right" class="card">?</div>
        </div>

        <div id="status-msg" class="msg">ဖဲဝေရန် နှိပ်ပါ</div>

        <div class="game-actions">
            <button id="deal-btn" onclick="dealOuter()">ဖဲဝေမည်</button>
            <button id="draw-btn" class="hide" onclick="drawMiddle()">ကြားဖဲလှန်မည်</button>
            <button onclick="location.reload()">ပြန်စမည်</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
