<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Odd or Even - MoneyBed 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-box">
        <h2 style="color: #ffd700;">စုံ သို့မဟုတ် မ (Odd/Even)</h2>
        
        <div class="dice-area">
            <div id="dice-result" class="dice">-</div>
        </div>

        <div id="status" class="status-text">လောင်းကြေးတင်ရန် စောင့်ဆိုင်းနေသည်</div>

        <div class="bet-area">
            <button class="bet-btn even" onclick="playGame('even')">စုံ (Even)</button>
            <button class="bet-btn odd" onclick="playGame('odd')">မ (Odd)</button>
        </div>
        
        <div class="info">
            လက်ကျန်ငွေ: <span id="balance">50000</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
