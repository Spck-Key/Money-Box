<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shan Koe Mee - MoneyBed 3D</title>
    
    <link rel="stylesheet" href="shan.css">
    
    <style>
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            height: 90vh;
        }
        .hand-label {
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            color: gold;
            font-weight: bold;
        }
        .status-msg {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 5px #000;
            height: 30px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h2 style="color: gold; text-shadow: 0 0 10px #000;">SHAN KOE MEE</h2>

        <div class="dealer-area">
            <div class="hand-label">ဒိုင် (Dealer) - <span id="dPoints">?</span> မှတ်</div>
            <div id="dealerCards" class="hand">
                <div class="card-back">MB</div>
                <div class="card-back">MB</div>
            </div>
        </div>

        <div id="gameStatus" class="status-msg">လောင်းကြေးတင်ပြီး ဖဲဝေပါ</div>

        <div class="player-area">
            <div id="playerCards" class="hand">
                <div class="card-back">MB</div>
                <div class="card-back">MB</div>
            </div>
            <div class="hand-label">သင့်ဖဲ (You) - <span id="pPoints">?</span> မှတ်</div>
        </div>

        <div class="controls">
            <div style="margin-bottom: 15px;">
                Bet: <input type="number" id="betInput" value="1000" step="500" 
                      style="width: 80px; padding: 5px; border-radius: 5px; border: none;">
            </div>
            <button class="play-btn" onclick="startDeal()">ဖဲဝေမည်</button>
        </div>
    </div>

    <script src="shan.js"></script>
    
    <script>
        function startDeal() {
            let bet = parseInt(document.getElementById('betInput').value);
            
            // shan.js ထဲမှ AI Logic ကို လှမ်းခေါ်ခြင်း
            let res = playShan(bet); 

            // ရလဒ်များကို UI တွင် ပြသခြင်း
            renderCards('dealerCards', res.dealer);
            renderCards('playerCards', res.player);
            
            document.getElementById('dPoints').innerText = res.dealerPoints;
            document.getElementById('pPoints').innerText = res.playerPoints;
            
            // အနိုင်အရှုံး စာသားပြခြင်း
            let statusEl = document.getElementById('gameStatus');
            statusEl.innerText = res.status + " (" + (res.amount >= 0 ? "+" : "") + res.amount + ")";
            statusEl.style.color = res.amount > 0 ? "#00ff00" : (res.amount < 0 ? "#ff0000" : "white");
        }

        function renderCards(elementId, cards) {
            let area = document.getElementById(elementId);
            area.innerHTML = '';
            cards.forEach(c => {
                let cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                // အနီရောင်ဖဲချပ် (, ) ဆိုလျှင် စာသားအနီရောင်ပြောင်းမည်
                if(c.suit === '' || c.suit === '') cardDiv.style.color = 'red';
                
                cardDiv.innerHTML = `<div>${c.value}</div><div>${c.suit}</div>`;
                area.appendChild(cardDiv);
            });
        }
    </script>
</body>
</html>
