<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Hunter - MoneyBed 3D</title>
    
    <link rel="stylesheet" href="fish.css">
    
    <style>
        /* UI Layer အတွက် ထပ်ဆောင်း Style အနည်းငယ် */
        #game-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 2px solid gold;
            z-index: 10;
        }
        .bet-info { color: gold; font-weight: bold; font-family: sans-serif; }
    </style>
</head>
<body>

    <canvas id="fishCanvas"></canvas>

    <div id="game-ui">
        <div class="bet-info">
            လက်ကျန်: <span id="userBalance">50000</span>
        </div>
        
        <div class="controls">
            <button class="adjust-btn" onclick="changeBet(-50)">-</button>
            <span id="currentBet" style="color: white; margin: 0 10px;">100</span>
            <button class="adjust-btn" onclick="changeBet(50)">+</button>
        </div>

        <button id="fireBtn" class="fire-btn" onclick="handleShoot()">FIRE</button>
    </div>

    <script src="fish.js"></script>
    
    <script>
        const canvas = document.getElementById('fishCanvas');
        const ctx = canvas.getContext('2d');

        // Canvas Size ကို Screen အပြည့်ညှိခြင်း
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 80; // UI ဘားအတွက် ချန်ထားခြင်း
        }
        window.addEventListener('resize', resize);
        resize();

        let betAmt = 100;

        function changeBet(amt) {
            betAmt += amt;
            if(betAmt < 50) betAmt = 50;
            document.getElementById('currentBet').innerText = betAmt;
        }

        // ပစ်ခတ်ခြင်း လုပ်ဆောင်ချက်
        function handleShoot() {
            // fish.js ထဲရှိ AI Logic ကို လှမ်းခေါ်ခြင်း
            let shotData = fireBullet(betAmt); 
            
            // ကျည်ဆန် Animation နှင့် ငါးထိမှန်မှု စစ်ဆေးခြင်းများကို ဤနေရာတွင် ဆက်လက်လုပ်ဆောင်ပါမည်
            console.log("Bullet Fired: Admin Cut - " + shotData.adminProfit);
            
            // ဥပမာ - ငါးတစ်ကောင်ကို ထိမှန်သည်ဟု ယူဆလျှင်
            // let result = checkCatch(betAmt, FISH_TYPES[0]);
        }

        // အခြေခံ Animation Loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // ဤနေရာတွင် ငါးများ၏ ပုံရိပ်များကို ဆွဲပေးရပါမည်
            ctx.fillStyle = "rgba(255,215,0,0.3)";
            ctx.font = "20px Myanmar";
            ctx.fillText("ငါးဖမ်းဂိမ်း စတင်နေပါပြီ...", canvas.width/2 - 80, canvas.height/2);

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
