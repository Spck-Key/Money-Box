<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Bu Gyi (5 Cards) - MoneyBed 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h2 style="color: gold;">ဘူကြီး (ဖဲ ၅ ချပ်) - ပိုင်ရှင်ဒိုင်</h2>
        
        <div class="dealer-area">
            <p>ဒိုင် (Dealer)</p>
            <div id="dealer-cards" class="card-row"></div>
            <div id="dealer-result" class="result">?</div>
        </div>

        <div class="player-area">
            <div id="player-result" class="result">?</div>
            <div id="player-cards" class="card-row"></div>
            <p>လူကြီးမင်း (Player)</p>
        </div>

        <div class="controls">
            <button class="play-btn" onclick="startDeal()">ဖဲဝေမည်</button>
            <button onclick="location.reload()">အသစ်ပြန်စ</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
